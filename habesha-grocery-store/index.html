<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/logo-32x32.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/logo-192x192.png" />

    <!-- SEO -->
    <title>Habesha Grocery Store | Ethiopian & Eritrean Foods</title>
    <meta
      name="description"
      content="Habesha Grocery Store in Sioux City offering authentic Ethiopian and Eritrean spices, coffee, injera, housewares, and cultural products."
    />
    <meta
      name="keywords"
      content="Habesha grocery, Ethiopian food, Eritrean spices, Injera, Berbere, Jebena, Sioux City"
    />
    <meta name="author" content="Habesha/Tropical Grocery Store" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Habesha Grocery Store" />
    <meta
      property="og:description"
      content="Authentic Ethiopian & Eritrean groceries, spices, coffee, and cultural items in Sioux City."
    />
    <meta property="og:type" content="business.business" />
    <meta property="og:url" content="https://web.facebook.com/HabeshaGroceryStore/" />
    <meta property="og:image" content="/icons/logo-512x512.png" />

    <!-- Local Business Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GroceryStore",
        "name": "Habesha/Tropical Grocery Store",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "424 20th St",
          "addressLocality": "Sioux City",
          "addressRegion": "IA",
          "postalCode": "51104",
          "addressCountry": "US"
        },
        "telephone": "+1-641-758-4943",
        "url": "https://web.facebook.com/HabeshaGroceryStore/"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
